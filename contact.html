<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Sasha — Food Science student at JKUAT">
    <title>Sasha | Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Skip link: allows keyboard users to skip the nav -->
  <a href="#main" class="skip-link">Skip to main content</a>

  <header>
    <div class="container">
      <a href="index.html" class="logo">Sasha</a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="contact-section">
      <div class="container">
        <h2>Get In Touch</h2>
        <div class="contact-info">
            <p><strong>Email:</strong> <a href="mailto:sasha.karanja@students.jkuat.ac.ke">sasha.karanja@students.jkuat.ac.ke</a></p>
            <p><strong>Phone:</strong> <a href="tel:+254736503156">+254 736 503156</a></p>
        </div>
        <!-- action="#" keeps the form on the same page (no backend for this lab) -->
        <form class="contact-form" action="#" method="POST" novalidate>

          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name"
                placeholder="Jane Doe" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email"
                placeholder="jane@example.com" required>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject">
              <option value="">Select a subject</option>
              <option>Collaboration</option>
              <option>Employment Opportunity</option>
              <option>General Enquiry</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5"
                placeholder="Your message here..." required></textarea>
          </div>

          <button type="submit" class="btn">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; <span id="year"></span> Sasha Karanja — BSc Food Science &amp; Technology</p>
    </div>
  </footer>
  <script src="js/script.js"></script>
  <script>
     document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
